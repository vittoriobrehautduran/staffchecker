version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Use npm ci for faster, reliable installs
        # Amplify caches node_modules automatically, so we don't need to delete it
        # This reduces build time from ~3-5 min to ~30-60 seconds
        - npm ci --prefer-offline --no-audit || npm install --prefer-offline --no-audit
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-XSS-Protection'
          value: '1; mode=block'
redirects:
  - source: '/*'
    target: '/index.html'
    status: '200'

